site_name: metrics
site_description: Personal AI-tool adoption metrics for Codex CLI and Claude Code
site_url: https://mikegorelikoff.github.io/ad-sdlc-metrics/
repo_url: https://github.com/mikegorelikoff/ad-sdlc-metrics
repo_name: mikegorelikoff/ad-sdlc-metrics
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - content.code.copy
    - toc.integrate

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight

nav:
  - Why this exists: index.md
  - Methodology: methodology.md
  - Framework reference: framework-reference.md
  - Data model: data-model.md
  - Usage: usage.md
  - Limitations & open questions: limitations.md
