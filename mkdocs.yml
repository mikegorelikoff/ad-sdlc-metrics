site_name: ai-sdlc-metrics
site_description: Personal AI-tool adoption metrics for Codex CLI and Claude Code
site_url: https://mikegorelikoff.github.io/ad-sdlc-metrics/
repo_url: https://github.com/mikegorelikoff/ad-sdlc-metrics
repo_name: mikegorelikoff/ad-sdlc-metrics
edit_uri: edit/main/docs/
copyright: Copyright 2026 Mike Gorelikov, licensed under Apache License 2.0

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.sections
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tooltips
    - toc.follow

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight

nav:
  - Why this exists: index.md
  - Methodology: methodology.md
  - Framework reference: framework-reference.md
  - Data model: data-model.md
  - Usage: usage.md
  - Limitations & open questions: limitations.md
